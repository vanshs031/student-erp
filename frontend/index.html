<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ERP</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Student ERP</h1>

        <form id="studentForm">

            <input
                type="text"
                id="name"
                placeholder="Enter Name"
                required
            >

            <input
                type="text"
                id="course"
                placeholder="Enter Course"
                required
            >

            <button type="submit">
                Add Student
            </button>

        </form>
        <h2>Student List</h2>
        <div id="studentList"></div>

    </div>

<script src="script.js"></script>

</body>
</html>
